version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /opt/airflow
    # Auto-install scraping packages into all Airflow containers on start
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      selenium==4.18.1 undetected-chromedriver==3.5.5 selenium-stealth==1.0.6 fake-useragent==1.4.0 psycopg2-binary==2.9.9 pandas python-dotenv==1.0.1
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scrapers:/opt/airflow/scrapers
    - ./utils:/opt/airflow/utils
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres_airflow:
      condition: service_healthy

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — Airflow metadata DB
  # --------------------------------------------------------------------------
  postgres_airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # PostgreSQL — Game data DB  (scraping results live here)
  # --------------------------------------------------------------------------
  postgres_game:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${GAME_DB_USER}
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD}
      POSTGRES_DB: ${GAME_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - game_pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${GAME_DB_USER}" ]
      interval: 10s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # Airflow — DB init (run once)
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"

  # --------------------------------------------------------------------------
  # Airflow — Webserver (UI at localhost:8080)
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # Airflow — Scheduler
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_pg_data:
  game_pg_data:
